name: MusicBox
options:
  bundleIdPrefix: com.musicbox
  deploymentTarget:
    iOS: "26.0"
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  MusicBox:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Shared
        excludes:
          - Info.plist
          - MusicBox.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.musicbox.app
        PRODUCT_NAME: MusicBox
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Shared/Info.plist
        CODE_SIGN_ENTITLEMENTS: Shared/MusicBox.entitlements
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_IDENTITY: "-"
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    dependencies:
      - sdk: JavaScriptCore.framework
      - sdk: AVFoundation.framework
      - sdk: MediaPlayer.framework
